<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond Duel Pro</title>
    <style>
        :root { --main-bg: #0d1b2a; --field-green: #2d6a4f; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--main-bg); color: white; text-align: center; margin: 0; overflow: hidden; }
        #game-container { padding: 15px; max-width: 500px; margin: auto; }
        .stats-bar { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; }
        .stadium { background: var(--field-green); height: 250px; border-radius: 50% 50% 10px 10px; border: 4px solid #fff; position: relative; margin: 20px 0; overflow: hidden; }
        .ball { width: 15px; height: 15px; background: white; border-radius: 50%; position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%); transition: all 0.5s ease-in; display: none; box-shadow: 0 0 10px rgba(255,255,255,0.8); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 20px; font-size: 18px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; touch-action: manipulation; }
        button:active { filter: brightness(1.2); transform: scale(0.95); }
        #log { margin-top: 15px; font-style: italic; color: #bdc3c7; min-height: 1.2em; }
        .at-bat-stats { font-size: 12px; color: #95a5a6; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-bar">
        <div>Score: <span id="score">0</span></div>
        <div>Inning: <span id="inning">1</span></div>
        <div>Outs: <span id="outs">0</span></div>
    </div>

    <div class="at-bat-stats">Batter: .285 AVG | Pitcher: 98 MPH FB</div>

    <div class="stadium">
        <div id="ball" class="ball"></div>
        <div style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%);">🏠</div>
    </div>

    <p id="log">The pitcher is set...</p>

    <div class="controls">
        <button onclick="userSwing('Contact')">CONTACT SWING</button>
        <button onclick="userSwing('Power')" style="background: #e67e22;">POWER SWING</button>
    </div>
</div>

<script>
    let gameState = { score: 0, outs: 0, inning: 1, baseRunners: 0 };
    const ball = document.getElementById('ball');
    const log = document.getElementById('log');

    // Simple AI "Pitcher" Logic
    const pitches = [
        { name: "Fastball", speed: 98, difficulty: 0.7 },
        { name: "Slider", speed: 85, difficulty: 0.5 },
        { name: "Changeup", speed: 82, difficulty: 0.4 }
    ];

    function userSwing(swingType) {
        const pitch = pitches[Math.floor(Math.random() * pitches.length)];
        animatePitch(pitch, swingType);
    }

    function animatePitch(pitch, swingType) {
        ball.style.display = 'block';
        ball.style.bottom = '200px'; // Pitch starts at mound
        
        setTimeout(() => {
            calculateOutcome(pitch, swingType);
        }, 500);
    }

    function calculateOutcome(pitch, swingType) {
        const hitRoll = Math.random();
        const powerRoll = Math.random();
        let result = "";

        // Success threshold based on pitch difficulty
        let threshold = swingType === 'Contact' ? 0.4 : 0.6;
        
        if (hitRoll > threshold) {
            // It's a hit!
            if (swingType === 'Power' && powerRoll > 0.7) {
                result = "🚀 CRUSHED! HOME RUN!";
                gameState.score += (gameState.baseRunners + 1);
                gameState.baseRunners = 0;
                ball.style.bottom = '500px'; // Ball flies out
            } else {
                result = "⚾ Line Drive Single!";
                gameState.baseRunners = Math.min(gameState.baseRunners + 1, 3);
                gameState.score += (gameState.baseRunners === 3 ? 1 : 0);
                ball.style.bottom = '150px';
                ball.style.left = Math.random() > 0.5 ? '20%' : '80%';
            }
        } else {
            // It's an out
            gameState.outs++;
            result = hitRoll < 0.2 ? "Strikes out swinging!" : "Pop fly out.";
            ball.style.bottom = '40px';
            ball.style.display = 'none';
        }

        updateUI(result);
        
        if (gameState.outs >= 3) {
            nextInning();
        }
    }

    function updateUI(msg) {
        log.innerText = msg;
        document.getElementById('score').innerText = gameState.score;
        document.getElementById('outs').innerText = gameState.outs;
        document.getElementById('inning').innerText = gameState.inning;
        
        // Reset ball position
        setTimeout(() => {
            ball.style.display = 'none';
            ball.style.bottom = '40px';
            ball.style.left = '50%';
        }, 1000);
    }

    function nextInning() {
        alert(`Inning over! Total Score: ${gameState.score}`);
        gameState.inning++;
        gameState.outs = 0;
        gameState.baseRunners = 0;
        updateUI("New Inning! Let's go!");
    }
</script>
</body>
</html>
